# =============================================================================
# LibreTime Multi-Station - Proxy Reverso Principal
# EstacionKusMedios Digital
# =============================================================================

upstream runaradio_web {
    server runaradio-nginx:8080;
}

upstream estacionkusfm_web {
    server estacionkusfm-nginx:8080;
}

upstream radioaventuramx_web {
    server radioaventuramx-nginx:8080;
}

upstream runaradio_icecast {
    server runaradio-icecast:8000;
}

upstream estacionkusfm_icecast {
    server estacionkusfm-icecast:8000;
}

upstream radioaventuramx_icecast {
    server radioaventuramx-icecast:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 512M;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # =========================================================================
    # Página principal - Lista de estaciones
    # =========================================================================
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstacionKusMedios Digital</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; background: #1a1a2e; color: #eee; }
        h1 { color: #e94560; text-align: center; }
        h2 { color: #0f3460; }
        .station { background: #16213e; border-radius: 10px; padding: 20px; margin: 20px 0; border-left: 4px solid #e94560; }
        .station h2 { color: #e94560; margin-top: 0; }
        a { color: #00d2ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .links { display: flex; gap: 20px; flex-wrap: wrap; }
        .links a { background: #0f3460; padding: 8px 16px; border-radius: 5px; }
        .footer { text-align: center; margin-top: 40px; color: #666; }
    </style>
</head>
<body>
    <h1>EstacionKusMedios Digital</h1>
    <p style="text-align:center;">Plataforma de Radio Digital Multi-Estacion</p>

    <div class="station">
        <h2>Runaradio</h2>
        <div class="links">
            <a href="/runaradio/">Panel Web</a>
            <a href="/icecast/runaradio/">Stream Icecast</a>
        </div>
    </div>

    <div class="station">
        <h2>EstacionKusFM</h2>
        <div class="links">
            <a href="/estacionkusfm/">Panel Web</a>
            <a href="/icecast/estacionkusfm/">Stream Icecast</a>
        </div>
    </div>

    <div class="station">
        <h2>RadioAventuraMX</h2>
        <div class="links">
            <a href="/radioaventuramx/">Panel Web</a>
            <a href="/icecast/radioaventuramx/">Stream Icecast</a>
        </div>
    </div>

    <div class="footer">
        <p>Powered by LibreTime 4.5.0</p>
    </div>
</body>
</html>';
    }

    # =========================================================================
    # Estación 1: Runaradio
    # =========================================================================
    location /runaradio/ {
        proxy_pass http://runaradio_web/;
        proxy_redirect / /runaradio/;
    }

    location /icecast/runaradio/ {
        proxy_pass http://runaradio_icecast/;
        proxy_redirect / /icecast/runaradio/;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # =========================================================================
    # Estación 2: EstacionKusFM
    # =========================================================================
    location /estacionkusfm/ {
        proxy_pass http://estacionkusfm_web/;
        proxy_redirect / /estacionkusfm/;
    }

    location /icecast/estacionkusfm/ {
        proxy_pass http://estacionkusfm_icecast/;
        proxy_redirect / /icecast/estacionkusfm/;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # =========================================================================
    # Estación 3: RadioAventuraMX
    # =========================================================================
    location /radioaventuramx/ {
        proxy_pass http://radioaventuramx_web/;
        proxy_redirect / /radioaventuramx/;
    }

    location /icecast/radioaventuramx/ {
        proxy_pass http://radioaventuramx_icecast/;
        proxy_redirect / /icecast/radioaventuramx/;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
