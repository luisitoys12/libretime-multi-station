# =============================================================================
# LibreTime Multi-Station - EstacionKusMedios Digital
# =============================================================================
# 3 estaciones: Runaradio, EstacionKusFM, RadioAventuraMX
#
# Uso:
#   Todas las estaciones:  docker compose up -d
#   Solo una estación:     docker compose --profile runaradio up -d
#   Dos estaciones:        docker compose --profile runaradio --profile estacionkusfm up -d
# =============================================================================

services:

  # ===========================================================================
  # PROXY REVERSO PRINCIPAL
  # ===========================================================================
  proxy:
    image: nginx:1.25-alpine
    profiles: ["runaradio", "estacionkusfm", "radioaventuramx"]
    ports:
      - "80:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy_net
    restart: unless-stopped

  # ===========================================================================
  # ESTACIÓN 1: RUNARADIO
  # ===========================================================================
  runaradio-postgres:
    image: postgres:15
    profiles: ["runaradio"]
    volumes:
      - runaradio_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: libretime
      POSTGRES_PASSWORD: ${RUNARADIO_POSTGRES_PASSWORD}
    networks:
      - runaradio_net
    healthcheck:
      test: pg_isready -U libretime
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  runaradio-rabbitmq:
    image: rabbitmq:3.13-alpine
    profiles: ["runaradio"]
    environment:
      RABBITMQ_DEFAULT_VHOST: /libretime
      RABBITMQ_DEFAULT_USER: libretime
      RABBITMQ_DEFAULT_PASS: ${RUNARADIO_RABBITMQ_PASS}
    networks:
      - runaradio_net
    healthcheck:
      test: nc -z 127.0.0.1 5672
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  runaradio-playout:
    image: ghcr.io/libretime/libretime-playout:${LIBRETIME_VERSION:-4.5.0}
    profiles: ["runaradio"]
    init: true
    ulimits:
      nofile: 1024
    depends_on:
      runaradio-rabbitmq:
        condition: service_healthy
    volumes:
      - ./stations/runaradio/config.yml:/etc/libretime/config.yml:ro
      - runaradio_playout:/app
    environment:
      LIBRETIME_GENERAL_PUBLIC_URL: http://runaradio-nginx:8080
    networks:
      - runaradio_net
    restart: unless-stopped

  runaradio-liquidsoap:
    image: ghcr.io/libretime/libretime-playout:${LIBRETIME_VERSION:-4.5.0}
    profiles: ["runaradio"]
    command: /usr/local/bin/libretime-liquidsoap
    init: true
    ulimits:
      nofile: 1024
    ports:
      - "8101:8001"
      - "8102:8002"
    depends_on:
      runaradio-rabbitmq:
        condition: service_healthy
    volumes:
      - ./stations/runaradio/config.yml:/etc/libretime/config.yml:ro
      - runaradio_playout:/app
    environment:
      LIBRETIME_GENERAL_PUBLIC_URL: http://runaradio-nginx:8080
    networks:
      - runaradio_net
    restart: unless-stopped

  runaradio-analyzer:
    image: ghcr.io/libretime/libretime-analyzer:${LIBRETIME_VERSION:-4.5.0}
    profiles: ["runaradio"]
    init: true
    ulimits:
      nofile: 1024
    depends_on:
      runaradio-rabbitmq:
        condition: service_healthy
    volumes:
      - ./stations/runaradio/config.yml:/etc/libretime/config.yml:ro
      - runaradio_storage:/srv/libretime
    environment:
      LIBRETIME_GENERAL_PUBLIC_URL: http://runaradio-nginx:8080
    networks:
      - runaradio_net
    restart: unless-stopped

  runaradio-worker:
    image: ghcr.io/libretime/libretime-worker:${LIBRETIME_VERSION:-4.5.0}
    profiles: ["runaradio"]
    init: true
    ulimits:
      nofile: 1024
    depends_on:
      runaradio-rabbitmq:
        condition: service_healthy
    volumes:
      - ./stations/runaradio/config.yml:/etc/libretime/config.yml:ro
    environment:
      LIBRETIME_GENERAL_PUBLIC_URL: http://runaradio-nginx:8080
    networks:
      - runaradio_net
    restart: unless-stopped

  runaradio-api:
    image: ghcr.io/libretime/libretime-api:${LIBRETIME_VERSION:-4.5.0}
    profiles: ["runaradio"]
    init: true
    ulimits:
      nofile: 1024
    depends_on:
      runaradio-postgres:
        condition: service_healthy
      runaradio-rabbitmq:
        condition: service_healthy
    volumes:
      - ./stations/runaradio/config.yml:/etc/libretime/config.yml:ro
      - runaradio_storage:/srv/libretime
    networks:
      - runaradio_net
    restart: unless-stopped

  runaradio-legacy:
    image: ghcr.io/libretime/libretime-legacy:${LIBRETIME_VERSION:-4.5.0}
    profiles: ["runaradio"]
    init: true
    ulimits:
      nofile: 1024
    depends_on:
      runaradio-postgres:
        condition: service_healthy
      runaradio-rabbitmq:
        condition: service_healthy
    volumes:
      - ./stations/runaradio/config.yml:/etc/libretime/config.yml:ro
      - runaradio_storage:/srv/libretime
    networks:
      - runaradio_net
    restart: unless-stopped

  runaradio-nginx:
    image: ghcr.io/libretime/libretime-nginx:${LIBRETIME_VERSION:-4.5.0}
    profiles: ["runaradio"]
    ports:
      - "8081:8080"
    depends_on:
      - runaradio-legacy
    volumes:
      - runaradio_storage:/srv/libretime:ro
    networks:
      - runaradio_net
      - proxy_net
    restart: unless-stopped

  runaradio-icecast:
    image: ghcr.io/libretime/icecast:2.4.4
    profiles: ["runaradio"]
    ports:
      - "8010:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: ${RUNARADIO_ICECAST_SOURCE_PASSWORD}
      ICECAST_ADMIN_PASSWORD: ${RUNARADIO_ICECAST_ADMIN_PASSWORD}
      ICECAST_RELAY_PASSWORD: ${RUNARADIO_ICECAST_RELAY_PASSWORD}
    networks:
      - runaradio_net
      - proxy_net
    restart: unless-stopped

