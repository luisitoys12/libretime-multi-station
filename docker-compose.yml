# VOLÚMENES
# =============================================================================
volumes:
  # Runaradio
  runaradio_postgres_data: {}
  runaradio_storage: {}
  runaradio_playout: {}
  # EstacionKusFM
  estacionkusfm_postgres_data: {}
  estacionkusfm_storage: {}
  estacionkusfm_playout: {}
  # RadioAventuraMX
  radioaventuramx_postgres_data: {}
  radioaventuramx_storage: {}
  radioaventuramx_playout: {}

# =============================================================================
# REDES
# =============================================================================
networks:
  proxy_net:
    driver: bridge
  runaradio_net:
    driver: bridge
  estacionkusfm_net:
    driver: bridge
  radioaventuramx_net:
    driver: bridge
